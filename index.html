<title>TikTok Feed</title>

<style>

body{
margin:0;
background:black;
font-family:sans-serif;
overflow:hidden;
}

.feed{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
scroll-behavior:smooth;
}

.video{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
scroll-snap-align:start;
}

.tiktok-embed{
max-width:100%;
height:100%;
}

iframe{
width:100%;
height:100%;
border:none;
}

</style>
</head>
